{% extends "base.html" %}
{% block title %}Ingredientes - Inventario Recetas IA{% endblock %}
{% block content %}

<div class="flex-between" style="margin-bottom:1.2rem;">
    <h2 class="section-title">🥕 Mi inventario</h2>
    <span class="muted" id="saludo"></span>
</div>

<!-- Agregar ingrediente -->
<div class="card">
    <h3 style="font-size:1rem; margin-bottom:0.9rem; color:var(--gris-700);">Agregar ingrediente</h3>
    <form onsubmit="agregar(event)" class="form-ingrediente" style="display:grid; grid-template-columns:2fr 1fr 1.2fr auto; gap:0.7rem; align-items:end;">
        <div>
            <label>Nombre</label>
            <input type="text" id="ing-nombre" required placeholder="Tomate, arroz, pollo..." minlength="2">
        </div>
        <div>
            <label>Cantidad</label>
            <input type="number" id="ing-cantidad" required min="0.01" step="0.01" placeholder="2">
        </div>
        <div>
            <label>Unidad</label>
            <select id="ing-unidad">
                <option>unidades</option>
                <option>gramos</option>
                <option>kg</option>
                <option>ml</option>
                <option>litros</option>
                <option>tazas</option>
                <option>cucharadas</option>
                <option>pizca</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary" id="btn-add">+ Agregar</button>
    </form>
</div>

<!-- Lista -->
<div class="card">
    <div class="flex-between" style="margin-bottom:0.8rem;">
        <h3 style="font-size:1rem; color:var(--gris-700);">
            Disponibles <span class="badge badge-count" id="total">0</span>
        </h3>
        <a href="/ui/recipes" class="btn btn-primary btn-sm">Generar receta con IA ✨</a>
    </div>
    <div id="lista">
        <div class="empty"><span class="spinner spinner-verde"></span></div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script>
    if (!requiereSesion()) { } // redirige si no hay token
    document.getElementById('saludo').textContent = NOMBRE ? ('Hola, ' + NOMBRE) : '';

    function escapar(t) {
        return String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function cargar() {
        const r = await api('/ingredients/');
        if (!r.ok) return;
        const lista = await r.json();
        document.getElementById('total').textContent = lista.length;
        const cont = document.getElementById('lista');

        if (lista.length === 0) {
            cont.innerHTML = `<div class="empty"><span class="icon">🍽️</span>
                Tu inventario está vacío.<br>Agrega tu primer ingrediente arriba.</div>`;
            return;
        }
        cont.innerHTML = lista.map(ing => `
            <div class="row-item">
                <span>
                    <strong>${escapar(ing.nombre)}</strong>
                    <span class="chip">${ing.cantidad} ${escapar(ing.unidad)}</span>
                </span>
                <button class="btn btn-danger btn-sm" onclick="eliminar(${ing.id}, '${escapar(ing.nombre).replace(/'/g, "\\'")}')">Eliminar</button>
            </div>
        `).join('');
    }

    async function agregar(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-add');
        btn.disabled = true;
        const r = await api('/ingredients/', {
            method: 'POST',
            body: JSON.stringify({
                nombre:   document.getElementById('ing-nombre').value.trim(),
                cantidad: parseFloat(document.getElementById('ing-cantidad').value),
                unidad:   document.getElementById('ing-unidad').value
            })
        });
        const datos = await r.json();
        btn.disabled = false;
        if (r.ok) {
            toast('Ingrediente agregado', 'ok');
            document.getElementById('ing-nombre').value = '';
            document.getElementById('ing-cantidad').value = '';
            document.getElementById('ing-nombre').focus();
            cargar();
        } else {
            toast(errorDetalle(datos, 'No se pudo agregar'), 'error');
        }
    }

    async function eliminar(id, nombre) {
        if (!confirm(`¿Eliminar "${nombre}" del inventario?`)) return;
        const r = await api('/ingredients/' + id, { method: 'DELETE' });
        if (r.ok) { toast('Ingrediente eliminado', 'info'); cargar(); }
        else toast('No se pudo eliminar', 'error');
    }

    cargar();
</script>
{% endblock %}
