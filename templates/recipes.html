{% extends "base.html" %}
{% block title %}Recetas - Inventario Recetas IA{% endblock %}
{% block content %}

<div class="flex-between" style="margin-bottom:1.2rem;">
    <h2 class="section-title">📖 Mis recetas</h2>
    <span class="muted" id="saludo"></span>
</div>

<!-- Generador -->
<div class="card" style="text-align:center;">
    <p class="muted" style="margin-bottom:1rem;">La IA creará una receta usando los ingredientes de tu inventario actual.</p>
    <button class="btn btn-primary btn-lg" id="btn-generar" onclick="generar()">✨ Generar receta con IA</button>
</div>

<!-- Receta recién generada -->
<div id="panel-nueva" class="card" style="display:none; border:2px solid var(--verde-300);">
    <span class="badge badge-facil" style="background:var(--verde-700); color:white;">✨ Recién generada</span>
    <div id="contenido-nueva" style="margin-top:0.8rem;"></div>
</div>

<!-- Guardadas -->
<div class="card">
    <h3 style="font-size:1rem; color:var(--gris-700); margin-bottom:0.9rem;">
        Recetas guardadas <span class="badge badge-count" id="total">0</span>
    </h3>
    <div id="lista">
        <div class="empty"><span class="spinner spinner-verde"></span></div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script>
    if (!requiereSesion()) { }
    document.getElementById('saludo').textContent = NOMBRE ? ('Hola, ' + NOMBRE) : '';

    function escapar(t) {
        return String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function badgeClase(nivel) {
        const n = (nivel || '').toLowerCase();
        if (n.includes('f')) return 'badge-facil';
        if (n.includes('m')) return 'badge-medio';
        return 'badge-dificil';
    }

    // Genera el HTML de estrellas para una receta dada
    function estrellasHTML(recetaId, valor) {
        valor = Math.round(valor || 0);
        const spans = [1,2,3,4,5].map(n =>
            `<span class="${n <= valor ? 'activa' : ''}" onclick="calificar(${recetaId}, ${n})">${n <= valor ? '★' : '☆'}</span>`
        ).join('');
        return `<span class="estrellas" data-receta="${recetaId}">${spans}</span>`;
    }

    function detalleHTML(rec) {
        return `
            <div class="flex-between">
                <h3 style="color:var(--verde-900); font-size:1.25rem;">${escapar(rec.nombre_plato)}</h3>
                <div style="display:flex; gap:0.5rem; align-items:center;">
                    <span class="badge ${badgeClase(rec.nivel_dificultad)}">${escapar(rec.nivel_dificultad)}</span>
                    <span class="muted">⏱ ${escapar(rec.tiempo_estimado)}</span>
                </div>
            </div>
            <div class="receta-detalle">
                <div>
                    <h4>Ingredientes</h4>
                    <ul>${rec.ingredientes.map(i => `<li>${escapar(i.nombre)} — ${escapar(i.cantidad)} ${escapar(i.unidad || '')}</li>`).join('')}</ul>
                </div>
                <div>
                    <h4>Preparación</h4>
                    <ol>${rec.pasos_preparacion.map(p => `<li>${escapar(p)}</li>`).join('')}</ol>
                </div>
            </div>
            <div class="flex-between" style="margin-top:1.1rem; border-top:1px solid var(--gris-100); padding-top:0.9rem;">
                <span style="font-size:0.9rem; color:var(--gris-700);">Tu calificación: ${estrellasHTML(rec.id, rec.calificacion_promedio)}</span>
                <button class="btn btn-danger btn-sm" onclick="eliminar(${rec.id})">Eliminar receta</button>
            </div>`;
    }

    async function generar() {
        const btn = document.getElementById('btn-generar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Consultando a la IA...';
        const r = await api('/recipes/generate', { method: 'POST' });
        btn.disabled = false;
        btn.innerHTML = '✨ Generar receta con IA';

        if (r.ok) {
            const rec = await r.json();
            const panel = document.getElementById('panel-nueva');
            document.getElementById('contenido-nueva').innerHTML = detalleHTML(rec);
            panel.style.display = 'block';
            panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
            toast('¡Receta generada!', 'ok');
            cargar();
        } else {
            const datos = await r.json();
            toast(errorDetalle(datos, 'No se pudo generar la receta'), 'error');
        }
    }

    async function calificar(recetaId, puntuacion) {
        const r = await api('/recipes/' + recetaId + '/rate', {
            method: 'POST',
            body: JSON.stringify({ puntuacion })
        });
        if (r.ok) {
            toast('Calificaste con ' + puntuacion + ' ★', 'ok');
            // Actualiza todas las filas de estrellas de esa receta en pantalla
            document.querySelectorAll(`.estrellas[data-receta="${recetaId}"]`).forEach(cont => {
                cont.outerHTML = estrellasHTML(recetaId, puntuacion);
            });
            cargar();
        } else {
            toast('No se pudo calificar', 'error');
        }
    }

    async function eliminar(id) {
        if (!confirm('¿Eliminar esta receta?')) return;
        const r = await api('/recipes/' + id, { method: 'DELETE' });
        if (r.ok) {
            toast('Receta eliminada', 'info');
            document.getElementById('panel-nueva').style.display = 'none';
            cargar();
        } else toast('No se pudo eliminar', 'error');
    }

    async function cargar() {
        const r = await api('/recipes/');
        if (!r.ok) return;
        const lista = await r.json();
        document.getElementById('total').textContent = lista.length;
        const cont = document.getElementById('lista');

        if (lista.length === 0) {
            cont.innerHTML = `<div class="empty"><span class="icon">🍲</span>
                Aún no tienes recetas.<br>Genera la primera con el botón de arriba.</div>`;
            return;
        }
        cont.innerHTML = lista.map(rec => {
            const prom = rec.calificacion_promedio
                ? `<span style="color:var(--amarillo); font-weight:700;">★ ${rec.calificacion_promedio}</span> <span class="muted">(${rec.total_calificaciones})</span>`
                : '<span class="muted">Sin calificar</span>';
            return `
                <details class="receta-card">
                    <summary>
                        <span>${escapar(rec.nombre_plato)}</span>
                        <span style="display:flex; gap:0.6rem; align-items:center;">
                            <span class="badge ${badgeClase(rec.nivel_dificultad)}">${escapar(rec.nivel_dificultad)}</span>
                            ${prom}
                            <span class="flecha">▼</span>
                        </span>
                    </summary>
                    <div style="margin-top:0.9rem;">${detalleHTML(rec)}</div>
                </details>`;
        }).join('');
    }

    cargar();
</script>
{% endblock %}
