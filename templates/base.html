<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventario Recetas IA{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand"><span class="logo">🍳</span> Inventario Recetas IA</a>
        <nav class="menu">
            <span id="nav-auth" style="display:none;">
                <a href="/ui/ingredients">🥕 Ingredientes</a>
                <a href="/ui/recipes">📖 Recetas</a>
                <a href="/docs" target="_blank">⚙ API</a>
                <a href="#" class="salir" onclick="cerrarSesion(); return false;">Salir</a>
            </span>
            <span id="nav-guest">
                <a href="/ui/login">Iniciar sesión</a>
            </span>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="pie">Inventario Recetas IA &mdash; Proyecto Final · Generador de Recetas con IA</footer>

    <div id="toast-zona"></div>

    <script>
        // ---- Sesión ----
        const TOKEN = localStorage.getItem('token');
        const NOMBRE = localStorage.getItem('nombre');

        if (TOKEN) {
            document.getElementById('nav-auth').style.display = 'inline-flex';
            document.getElementById('nav-guest').style.display = 'none';
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = '/';
        }

        // ---- Toasts ----
        function toast(texto, tipo = 'ok') {
            const z = document.getElementById('toast-zona');
            const t = document.createElement('div');
            const icono = tipo === 'ok' ? '✓' : tipo === 'error' ? '✕' : 'ℹ';
            t.className = 'toast ' + tipo;
            t.innerHTML = `<span style="font-weight:700;">${icono}</span><span>${texto}</span>`;
            z.appendChild(t);
            setTimeout(() => { t.classList.add('fade'); setTimeout(() => t.remove(), 300); }, 3200);
        }

        // ---- Cliente API autenticado ----
        async function api(url, opts = {}) {
            opts.headers = {
                ...(opts.headers || {}),
                'Authorization': 'Bearer ' + localStorage.getItem('token'),
                'Content-Type': 'application/json'
            };
            const r = await fetch(url, opts);
            if (r.status === 401) {
                localStorage.clear();
                toast('Tu sesión expiró, vuelve a iniciar sesión', 'error');
                setTimeout(() => window.location.href = '/ui/login', 1200);
            }
            return r;
        }

        // ---- Extrae mensaje de error legible de una respuesta FastAPI ----
        function errorDetalle(datos, fallback) {
            if (!datos) return fallback;
            if (typeof datos.detail === 'string') return datos.detail;
            if (Array.isArray(datos.detail) && datos.detail[0]) return datos.detail[0].msg;
            return fallback;
        }

        // ---- Protege páginas privadas ----
        function requiereSesion() {
            if (!localStorage.getItem('token')) {
                window.location.href = '/ui/login';
                return false;
            }
            return true;
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
