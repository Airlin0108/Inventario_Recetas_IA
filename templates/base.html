<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventario Recetas IA{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        header { background: #2d6a4f; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.4rem; }
        nav a { color: white; text-decoration: none; margin-left: 1.2rem; font-size: 0.95rem; }
        nav a:hover { text-decoration: underline; }
        main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.2rem; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        .btn { display: inline-block; padding: 0.5rem 1.2rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; }
        .btn-primary { background: #2d6a4f; color: white; }
        .btn-primary:hover { background: #1b4332; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        input, select, textarea { width: 100%; padding: 0.5rem 0.7rem; border: 1px solid #d1d5db; border-radius: 6px; margin-top: 0.3rem; font-size: 0.95rem; }
        label { font-size: 0.9rem; color: #555; margin-top: 0.8rem; display: block; }
        .msg-error { background: #fee2e2; color: #991b1b; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
        .msg-ok { background: #dcfce7; color: #166534; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
        .stars { color: #f59e0b; font-size: 1.1rem; }
        footer { text-align: center; padding: 2rem; color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>
    <header>
        <h1>🍳 Inventario Recetas IA</h1>
        <nav>
            <a href="/">Inicio</a>
            <a href="/ui/ingredients">Ingredientes</a>
            <a href="/ui/recipes">Recetas</a>
            <a href="/docs" target="_blank">API</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>Inventario Recetas IA &mdash; Proyecto Final</footer>
</body>
</html>
